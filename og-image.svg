<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0d10"/>
      <stop offset="1" stop-color="#1a1f29"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c8aef"/>
      <stop offset="1" stop-color="#a5b4fc"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- monogram -->
  <rect x="80" y="80" width="100" height="100" rx="20" fill="#0b0d10" stroke="url(#accent)" stroke-width="2"/>
  <text x="130" y="148" font-family="Inter,sans-serif" font-size="56" font-weight="600" fill="url(#accent)" text-anchor="middle">Ja</text>

  <!-- title -->
  <text x="80" y="280" font-family="Inter,sans-serif" font-size="72" font-weight="200" fill="#e2e8f0" letter-spacing="-1">JustAi</text>
  <text x="80" y="340" font-family="Inter,sans-serif" font-size="32" font-weight="300" fill="#a5b4fc" letter-spacing="-0.5">Control plane for mini-swe-agent–style coding agents</text>

  <!-- key concept callouts -->
  <g font-family="Inter,sans-serif" font-size="20" fill="#94a3b8" font-weight="300">
    <text x="80" y="430">scope_planner   →   intent_gate   →   reviewer   →   checkpoint   →   agent_dispatch</text>
  </g>

  <g font-family="JetBrains Mono,monospace" font-size="16" fill="#64748b">
    <text x="80" y="510">safe-mini  ·  the substrate</text>
    <text x="80" y="540">JustAi  ·  the orchestrator (this)</text>
    <text x="80" y="570">local-resident  ·  the experiment driver</text>
  </g>

  <!-- url corner -->
  <text x="1120" y="590" font-family="JetBrains Mono,monospace" font-size="14" fill="#475569" text-anchor="end">justai-demo.vercel.app</text>
</svg>
